name: AI Auto Reply

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  ai-reply:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: AI Auto Reply
        uses: actions/github-script@v7
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'deepseek' }}
        with:
          script: |
            const eventName = context.eventName;
            const payload = context.payload;

            // Skip bot comments to prevent infinite loops
            const actor = payload.sender?.login || '';
            if (actor.includes('[bot]') || actor === 'github-actions[bot]') {
              console.log('Skipping bot activity');
              return;
            }

            let prompt = '';
            let issueNumber = null;

            if (eventName === 'issues') {
              const issue = payload.issue;
              issueNumber = issue.number;
              prompt = `New Issue #${issue.number}\nTitle: ${issue.title}\nBody:\n${issue.body || '(empty)'}`;

            } else if (eventName === 'pull_request') {
              const pr = payload.pull_request;
              issueNumber = pr.number;

              // Fetch PR diff for context
              let diff = '';
              try {
                const diffResponse = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  mediaType: { format: 'diff' }
                });
                diff = typeof diffResponse.data === 'string'
                  ? diffResponse.data.substring(0, 4000)
                  : '';
              } catch (e) {
                console.log('Could not fetch diff:', e.message);
              }

              prompt = `New Pull Request #${pr.number}\nTitle: ${pr.title}\nBody:\n${pr.body || '(empty)'}\n\nCode Diff (truncated):\n${diff}`;

            } else if (eventName === 'issue_comment') {
              const comment = payload.comment;
              const issue = payload.issue;
              issueNumber = issue.number;

              if (comment.user?.type === 'Bot') {
                console.log('Skipping bot comment');
                return;
              }

              // Skip if comment contains AI footer (prevent loops)
              if (comment.body?.includes('This reply was generated by an AI assistant')) {
                console.log('Skipping AI-generated comment');
                return;
              }

              const isPR = !!issue.pull_request;
              const typeLabel = isPR ? 'Pull Request' : 'Issue';

              prompt = `New comment on ${typeLabel} #${issue.number}\n${typeLabel} Title: ${issue.title}\n${typeLabel} Body:\n${issue.body || '(empty)'}\n\nComment by @${comment.user.login}:\n${comment.body}`;
            }

            if (!prompt || !issueNumber) {
              console.log('No actionable event detected');
              return;
            }

            // Fetch repo README for context
            let readmeContext = '';
            try {
              const readmeResp = await github.rest.repos.getReadme({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const readmeContent = Buffer.from(readmeResp.data.content, 'base64').toString('utf8');
              readmeContext = `\nRepo README (excerpt):\n${readmeContent.substring(0, 1000)}`;
            } catch (e) {
              console.log('Could not fetch README:', e.message);
            }

            const systemPrompt = `You are a thoughtful assistant for the GitHub repository "${context.repo.owner}/${context.repo.repo}".
            ${readmeContext}

            Rules:
            - For Issues: acknowledge the problem, analyze it, suggest possible solutions or ask for clarification.
            - For PRs: thank the contributor, review the code diff, give specific and constructive feedback.
            - For comments: read the full context before replying with a helpful response.
            - Match the language used by the person (English, Chinese, etc.).
            - Be concise but substantive. No filler.
            - Use GitHub Markdown formatting.
            - End your reply with:
              > 🤖 This reply was generated by an AI assistant.`;

            // Determine which AI provider to use
            const aiProvider = process.env.AI_PROVIDER || 'deepseek';
            let reply = '';

            if (aiProvider === 'anthropic') {
              const apiKey = process.env.ANTHROPIC_API_KEY;
              if (!apiKey) {
                core.setFailed('ANTHROPIC_API_KEY secret is not set');
                return;
              }

              try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01'
                  },
                  body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 2048,
                    system: systemPrompt,
                    messages: [{ role: 'user', content: prompt }]
                  })
                });

                if (!response.ok) {
                  const errText = await response.text();
                  throw new Error(`Anthropic API error ${response.status}: ${errText}`);
                }

                const data = await response.json();
                reply = data.content?.[0]?.text || '';
              } catch (e) {
                core.setFailed(`Failed to call Anthropic API: ${e.message}`);
                return;
              }

            } else {
              // Default: DeepSeek
              const apiKey = process.env.DEEPSEEK_API_KEY;
              if (!apiKey) {
                core.setFailed('DEEPSEEK_API_KEY secret is not set');
                return;
              }

              try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                  },
                  body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                      { role: 'system', content: systemPrompt },
                      { role: 'user', content: prompt }
                    ],
                    max_tokens: 2048,
                    temperature: 0.7
                  })
                });

                if (!response.ok) {
                  const errText = await response.text();
                  throw new Error(`DeepSeek API error ${response.status}: ${errText}`);
                }

                const data = await response.json();
                reply = data.choices?.[0]?.message?.content || '';
              } catch (e) {
                core.setFailed(`Failed to call DeepSeek API: ${e.message}`);
                return;
              }
            }

            if (!reply) {
              console.log('Empty reply from API, skipping');
              return;
            }

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: reply
            });

            console.log(`Posted AI reply to #${issueNumber} using ${aiProvider}`);
